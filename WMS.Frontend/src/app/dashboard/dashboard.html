<div class="dashboard-container">
  <mat-card class="header-card">
    <div class="header-content">
      <div>
        <h1>Welcome, {{ username }}! 👋</h1>
        <p>Role: {{ role }}</p>
      </div>
      <button mat-raised-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-card>

  <div class="stats-grid">
    <mat-card *ngFor="let stat of stats" class="stat-card">
      <div class="stat-content">
        <mat-icon [style.color]="stat.color">{{ stat.icon }}</mat-icon>
        <div>
          <h2>{{ stat.value }}</h2>
          <p>{{ stat.title }}</p>
        </div>
      </div>
    </mat-card>
  </div>

  <div class="nav-grid">
    <mat-card class="nav-card" (click)="navigate('/employees')">
      <mat-icon>people</mat-icon>
      <p>Employees</p>
    </mat-card>
    <mat-card class="nav-card" (click)="navigate('/attendance')">
      <mat-icon>access_time</mat-icon>
      <p>Attendance</p>
    </mat-card>
    <mat-card class="nav-card" (click)="navigate('/leaves')">
      <mat-icon>event_busy</mat-icon>
      <p>Leaves</p>
    </mat-card>
    <mat-card class="nav-card" (click)="navigate('/departments')">
      <mat-icon>business</mat-icon>
      <p>Departments</p>
    </mat-card>
  </div>
</div>
