<div class="page-container">
  <div class="page-header">
    <button mat-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon> Back
    </button>
  </div>
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>access_time</mat-icon> Attendance Management
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="attendances" class="full-width">
        <ng-container matColumnDef="attendanceId">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let a">{{ a.attendanceId }}</td>
        </ng-container>
        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let a">{{ a.employeeName }}</td>
        </ng-container>
        <ng-container matColumnDef="checkIn">
          <th mat-header-cell *matHeaderCellDef>Check In</th>
          <td mat-cell *matCellDef="let a">{{ a.checkIn | date:'short' }}</td>
        </ng-container>
        <ng-container matColumnDef="checkOut">
          <th mat-header-cell *matHeaderCellDef>Check Out</th>
          <td mat-cell *matCellDef="let a">{{ a.checkOut | date:'short' }}</td>
        </ng-container>
        <ng-container matColumnDef="totalHours">
          <th mat-header-cell *matHeaderCellDef>Total Hours</th>
          <td mat-cell *matCellDef="let a">{{ a.totalHours | number:'1.1-1' }}</td>
        </ng-container>
        <ng-container matColumnDef="workMode">
          <th mat-header-cell *matHeaderCellDef>Work Mode</th>
          <td mat-cell *matCellDef="let a">{{ a.workMode }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
