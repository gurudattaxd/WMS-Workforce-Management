<div class="page-container">
  <div class="page-header">
    <button mat-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon> Back
    </button>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>business</mat-icon> Department Management
      </mat-card-title>
      <button mat-raised-button color="primary" (click)="showForm = !showForm">
        <mat-icon>add</mat-icon> Add Department
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="showForm" class="add-form">
        <mat-form-field appearance="outline">
          <mat-label>Department Name</mat-label>
          <input matInput [(ngModel)]="newDepartment.departmentName">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <input matInput [(ngModel)]="newDepartment.description">
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="addDepartment()">Save</button>
        <button mat-button (click)="showForm = false">Cancel</button>
      </div>

      <table mat-table [dataSource]="departments" class="full-width">
        <ng-container matColumnDef="departmentId">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let d">{{ d.departmentId }}</td>
        </ng-container>
        <ng-container matColumnDef="departmentName">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let d">{{ d.departmentName }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let d">{{ d.description }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let d">
            <button mat-icon-button color="warn" (click)="deleteDepartment(d.departmentId)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
