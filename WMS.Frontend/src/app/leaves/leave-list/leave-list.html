<div class="page-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>event_busy</mat-icon> Leave Management
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="leaves" class="full-width">
        <ng-container matColumnDef="leaveId">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let l">{{ l.leaveId }}</td>
        </ng-container>
        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let l">{{ l.employeeName }}</td>
        </ng-container>
        <ng-container matColumnDef="leaveType">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let l">{{ l.leaveType }}</td>
        </ng-container>
        <ng-container matColumnDef="fromDate">
          <th mat-header-cell *matHeaderCellDef>From</th>
          <td mat-cell *matCellDef="let l">{{ l.fromDate | date:'shortDate' }}</td>
        </ng-container>
        <ng-container matColumnDef="toDate">
          <th mat-header-cell *matHeaderCellDef>To</th>
          <td mat-cell *matCellDef="let l">{{ l.toDate | date:'shortDate' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let l">
            <span [class]="'status-' + l.status.toLowerCase()">{{ l.status }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let l">
            <button mat-icon-button color="primary" (click)="approveLeave(l.leaveId)"
              *ngIf="l.status === 'Pending'">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="rejectLeave(l.leaveId)"
              *ngIf="l.status === 'Pending'">
              <mat-icon>close</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
